<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calendar Month View</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app-shell">
    <div class="main-layout">
      <section class="calendar-card">
        <header class="toolbar">
          <div class="toolbar-left">
            <div class="date-badge">
              <span id="month-short" class="month-short">APR</span>
              <span id="today-number" class="today-number">20</span>
            </div>
            <div class="month-meta">
              <div class="month-line">
                <h1 id="month-year">April 2026</h1>
                <span id="week-pill" class="week-pill">Week 3</span>
              </div>
              <p id="month-range">Apr 1, 2026 - Apr 30, 2026</p>
            </div>
          </div>

          <div class="toolbar-right">
            <button class="icon-btn" aria-label="Search">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <circle cx="11" cy="11" r="7"></circle>
                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
              </svg>
            </button>

            <div class="date-nav">
              <button id="prev-month" class="arrow-btn" aria-label="Previous month">&larr;</button>
              <button id="today-btn" class="today-btn" type="button">Today</button>
              <button id="next-month" class="arrow-btn" aria-label="Next month">&rarr;</button>
            </div>

            <button class="view-btn" type="button">Month view <span>&#9662;</span></button>
            <button class="add-btn" type="button">+ Add event</button>
          </div>
        </header>

        <div class="calendar-grid">
          <div class="weekdays">
            <div>Sun</div>
            <div>Mon</div>
            <div>Tue</div>
            <div>Wed</div>
            <div>Thu</div>
            <div>Fri</div>
            <div>Sat</div>
          </div>

          <div class="calendar-dates"></div>
        </div>
      </section>

      <aside class="voice-card" aria-label="Voice Input Card">
        <div class="voice-card-head">
          <h2>Voice Input</h2>
          <p>Speak naturally to create events quickly.</p>
        </div>

        <div class="voice-wave" aria-hidden="true">
          <span></span>
          <span></span>
          <span></span>
          <span></span>
          <span></span>
        </div>

        <p id="voice-status" class="voice-status">Ready to listen</p>

        <textarea id="voice-text" class="voice-text" placeholder="Example: Schedule a team standup tomorrow at 10 AM"></textarea>

        <div class="voice-actions">
          <button id="start-voice" type="button" class="voice-btn primary">Start Listening</button>
          <button id="stop-voice" type="button" class="voice-btn">Stop</button>
          <button id="clear-voice" type="button" class="voice-btn">Clear</button>
        </div>
      </aside>
    </div>
  </main>
  <script src="script.js"></script>
</body>
</html>
