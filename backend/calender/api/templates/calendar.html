<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendar with Tasks</title>

<style>
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    padding: 20px;
    font-family: Arial, sans-serif;
    height: 100vh;
  }

  .calendar {
    display: flex;
    flex-direction: column;
    padding-top: 40px;

    padding-left: 120px;
    height: 90vh;
    width: 90vw;
  }

  .header {
    user_input-align: center;
    padding: 20px;
    font-size: 28px;
    font-weight: bold;
    background: #08e2ff;
    color: white;
  }

  .days, .dates {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    user_input-align: center;
  }

  .days {
    background: #eef2f7;
    font-weight: bold;
    padding: 10px 0;
  }

  .dates {
    flex: 1;
  }

  .date-box {
    border: 1px solid #eee;
    padding: 6px;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    justify-content: flex-start;
    overflow: hidden;
  }

  .date-number {
    font-weight: bold;
    margin-bottom: 5px;
  }

  .task {
    font-size: 12px;
    background: #e6f0ff;
    padding: 2px 4px;
    margin-bottom: 3px;
    border-radius: 4px;
    width: 100%;
    user_input-align: left;
  }

  .date-box:hover {
    background: #f5faff;
    cursor: pointer;
  }

.form-row {
  display: flex;
  gap: 10px;
  align-items: flex-end;
  flex-wrap: wrap;
}

.input-wrap {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.input-wrap label {
  font-size: 12px;
  color: #6b7280;
  letter-spacing: 0.04em;
}
.input-container {
  background: #f9f9f8;
  border: 0.5px solid #e5e7eb;
  border-radius: 12px;
  padding: 1.25rem 1.5rem;
  max-width: 480px;
  margin: 0 auto;
}
input[type="number"],
input[type="user_input"] {
  height: 38px;
  padding: 0 12px;
  border: 1.5px solid #d1d5db;
  border-radius: 8px;
  background: #fff;
  color: #111;
  font-size: 14px;
  outline: none;
  transition: border-color 0.15s, box-shadow 0.15s;
}

input[type="number"] { width: 110px; }
input[type="user_input"]   { width: 220px; }

input::placeholder { color: #767676; }

input:hover:not(:focus) { border-color: #9ca3af; }

input:focus {
  border-color: #6b7280;
  box-shadow: 0 0 0 3px rgba(0, 0, 0, 0.07);
}

button {
  height: 38px;
  padding: 0 18px;
  border-radius: 8px;
  border: 1px solid #d1d5db;
  background: #fff;
  color: #111;
  font-size: 14px;
  cursor: pointer;
  transition: background 0.12s, transform 0.1s;
}

.voice-button {
  padding-bottom: 70px;
  display: block;
  margin: 50px auto;
  width: 70px;
  height: 70px;
  border-radius: 50%;
  background-color:crimson;
}


</style>

</head>
<body>

<!-- FORM -->
<div class="input-container" style="padding:10px;">
  <input type="number" id="dayInput" placeholder="Day (1-30)" min="1" max="30">
  <input type="user_input" id="taskInput" placeholder="Task">
  <button onclick="addTask()">Add Task</button>
</div>

<!-- CALENDER-->
<div class="calendar">

  <!-- April 2026 -->
  <div class="header">April 2026</div>
  <div class="days">
    <div>Sun</div><div>Mon</div><div>Tue</div>
    <div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>
  </div>

  <div class="dates">
    <div></div><div></div><div></div>

    <!-- Auto days -->
    <!-- Repeat pattern for month -->
    <script>
      const datesContainer = document.currentScript.parentElement;

      function generateMonth(year, month, totalDays) {
        for (let d = 1; d <= totalDays; d++) {
          const box = document.createElement("div");
          box.className = "date-box";

          const dayStr = String(d).padStart(2, "0");
          const monthStr = String(month).padStart(2, "0");

          box.setAttribute("data-day", `${year}-${monthStr}-${dayStr}`);

          box.innerHTML = `<div class="date-number">${d}</div>`;
          datesContainer.appendChild(box);
        }
      }

      // April
      generateMonth(2026, 4, 30);
    </script>
  </div>

  <!-- Repeat for all months -->
  <script>
    const calendar = document.querySelector(".calendar");

    const months = [
      { name: "January 2026", days: 31, m: 1 },
      { name: "February 2026", days: 28, m: 2 },
      { name: "March 2026", days: 31, m: 3 },
      { name: "April 2026", days: 30, m: 4 },
      { name: "May 2026", days: 31, m: 5 },
      { name: "June 2026", days: 30, m: 6 },
      { name: "July 2026", days: 31, m: 7 },
      { name: "August 2026", days: 31, m: 8 },
      { name: "September 2026", days: 30, m: 9 },
      { name: "October 2026", days: 31, m: 10 },
      { name: "November 2026", days: 30, m: 11 },
      { name: "December 2026", days: 31, m: 12 }
    ];

    calendar.innerHTML = "";

    months.forEach(month => {
      const section = document.createElement("div");

      section.innerHTML = `
        <div class="header">${month.name}</div>
        <div class="days">
          <div>Sun</div><div>Mon</div><div>Tue</div>
          <div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>
        </div>
        <div class="dates"></div>
      `;

      const datesDiv = section.querySelector(".dates");

      for (let d = 1; d <= month.days; d++) {
        const box = document.createElement("div");
        box.className = "date-box";

        const dayStr = String(d).padStart(2, "0");
        const monthStr = String(month.m).padStart(2, "0");

        box.setAttribute("data-day", `2026-${monthStr}-${dayStr}`);
        box.innerHTML = `<div class="date-number">${d}</div>`;

        datesDiv.appendChild(box);
      }

      calendar.appendChild(section);
    });
  </script>

  <button class="voice-button" onclick="startRecording()"></button>
</div>


<script>

//records audio till silence occur and only extracts the first sentence
function startRecording() {

  //Browser's speech recogntion function that converts speech to user_input
  const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();

  recognition.continuous = false;        // stop after one sentence
  recognition.interimResults = false;   // only final result

  //Extracts the user_input
  recognition.onresult = function (event) {
    const user_input = event.results[0][0].transcript;

    //Sends POST req to backend
    sendToBackend(user_input);

    recognition.stop(); 
  };

  //--------------Error handlings-----
  recognition.onerror = function (event) {
    console.error(event.error);
    recognition.stop();
  };
  recognition.onend = function () {
    console.log("Recording stopped");
  };

  //----------------------------------
  recognition.start();
}

// Function that sends POST request to backend
function sendToBackend(user_input) {

  fetch("/add_event/", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ user_input: user_input })
  })
  .then(response => response.json())
  .then(data => {
    console.log("Backend response:", data);
    addEventAI(data);
  })
  .catch(error => {
    console.error("Error:", error);
  });
}

//Takes json and add event
function addEventAI(response){

  const targetDate = response.date;
  const title = response.title;

  const boxes = document.querySelectorAll(".date-box");

  let found = null;

  boxes.forEach(box => {
    if (box.getAttribute("data-day") === targetDate) {
      found = box;
    }
  });

  if (!found) {
    console.error("Date not found:", targetDate);
    return;
  }

  const task = document.createElement("div");
  task.className = "task";
  task.textContent = title;

  found.appendChild(task);
}

function addTask() {

// Store day and task inputs
const day = `2026-04-${String(document.getElementById("dayInput").value).padStart(2, "0")}`;  
const taskText = document.getElementById("taskInput").value.trim();

  //Error handlings
  if (!day || !taskText) return;
  if (day < 1 || day > 30) {
    alert("Enter valid day (1-30)");
    return;
  }

  // find inserted day-box
  const box = document.querySelector(`.date-box[data-day='${day}']`);
  if (!box) {
    alert("Invalid day");
    return;
  }

  //create a div of taskText and place at the found box
  const task = document.createElement("div");
  task.className = "task";
  task.textContent = taskText;
  box.appendChild(task);

  document.getElementById("taskInput").value = "";
  document.getElementById("dayInput").value = "";
}
</script>
</body>
</html>
