<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #calendar {
        display: grid;
        grid-template-columns: repeat(7, 1fr); /* 7 days */
        gap: 8px;
        }

        .day {
        border: 1px solid #ccc;
        min-height: 80px;
        padding: 5px;
} 
    </style>
</head>
<body>
    <div id="calendar"></div>
</body>
</html>
